<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exchange Rate Calculator</title>
    <script src="app.js" defer type="module"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <img src="img/money-bag-svgrepo-com.svg" class="money-img" alt="" />
    <h1>Exchange Rate Calculator</h1>
    <p>Choose the currency and the mounts to get the exchange rate</p>
    <div class="container">
      <div class="currency">
        <select name="" id="currency-one"></select>
        <input type="number" placeholder="0" value="1" id="amount-one" />
      </div>
      <div class="swap-rate-container">
        <button class="btn" id="swap">Swap</button>
        <div class="rate" id="rate"></div>
      </div>
      <div class="currency">
        <select name="" id="currency-two"></select>
        <input disabled type="number" placeholder="0" id="amount-two" />
      </div>
    </div>
  </body>
</html>
